<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>广告智能问答助手 — Amazon Ads</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
:root{
  --primary:#232F3E;--accent:#FF9900;--accent-hover:#E88B00;
  --bg:#F5F7FA;--card:#FFFFFF;--text:#1A1A2E;--text-light:#6B7280;
  --border:#E5E7EB;--success:#10B981;--blue:#3B82F6;
  --shadow:0 4px 24px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC','Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.header{background:var(--primary);color:white;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:12px;}
.header-logo{font-size:1.3rem;font-weight:700;cursor:pointer;color:white;}
.header-logo span{color:white;}
.header-tag{font-size:0.75rem;padding:3px 10px;background:rgba(255,153,0,0.2);color:var(--accent);border-radius:12px;font-weight:500;}
.header-right{display:flex;gap:12px;align-items:center;}
.header-admin{font-size:0.82rem;color:rgba(255,255,255,0.6);text-decoration:none;transition:color 0.2s;}
.header-admin:hover{color:var(--accent);}
.lang-switch{display:flex;background:rgba(255,255,255,0.1);border-radius:8px;overflow:hidden;}
.lang-btn{padding:4px 12px;font-size:0.75rem;border:none;cursor:pointer;font-weight:600;transition:all 0.2s;font-family:inherit;color:rgba(255,255,255,0.5);background:transparent;}
.lang-btn.active{background:var(--accent);color:white;}
</style>
<style>
.main{flex:1;max-width:800px;width:100%;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;}
.welcome{text-align:center;padding:32px 20px 24px;}
.welcome h2{font-size:1.4rem;font-weight:700;margin-bottom:8px;}
.welcome p{font-size:0.9rem;color:var(--text-light);line-height:1.6;}
.disclaimer{font-size:0.75rem;color:#9CA3AF;margin-top:8px;font-style:italic;}
.quick-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0 24px;}
.quick-tag{padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:0.82rem;color:var(--text-light);cursor:pointer;transition:all 0.2s;}
.quick-tag:hover{border-color:var(--accent);color:var(--accent);background:#FFF7ED;}
.chat-area{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:16px;min-height:200px;}
.msg{display:flex;gap:10px;max-width:85%;animation:fadeIn 0.3s ease;}
.msg-user{align-self:flex-end;flex-direction:row-reverse;}
.msg-ai{align-self:flex-start;}
.msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;color:white;}
.msg-user .msg-avatar{background:var(--blue);}
.msg-ai .msg-avatar{background:var(--accent);}
.msg-bubble{padding:12px 16px;border-radius:16px;font-size:0.9rem;line-height:1.7;white-space:pre-wrap;}
.msg-user .msg-bubble{background:var(--blue);color:white;border-bottom-right-radius:4px;}
.msg-ai .msg-bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:var(--shadow);}
.feedback{display:flex;gap:8px;margin-top:8px;padding-left:46px;}
.feedback-btn{padding:4px 12px;border-radius:14px;font-size:0.75rem;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all 0.2s;color:var(--text-light);font-family:inherit;}
.feedback-btn:hover{border-color:var(--accent);color:var(--accent);}
.feedback-done{font-size:0.75rem;color:var(--success);padding:4px 0;}
.input-area{padding:16px 0 8px;border-top:1px solid var(--border);margin-top:auto;}
.input-wrap{display:flex;gap:10px;align-items:flex-end;}
.input-wrap textarea{flex:1;padding:12px 16px;border:1px solid var(--border);border-radius:16px;font-size:0.9rem;font-family:inherit;resize:none;outline:none;transition:border-color 0.2s;min-height:48px;max-height:120px;line-height:1.5;}
.input-wrap textarea:focus{border-color:var(--accent);}
.send-btn{width:48px;height:48px;border-radius:50%;background:var(--accent);color:white;border:none;font-size:1.2rem;cursor:pointer;transition:background 0.2s;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.send-btn:hover{background:var(--accent-hover);}
.typing{display:flex;gap:4px;padding:8px 16px;}
.typing span{width:8px;height:8px;background:#D1D5DB;border-radius:50%;animation:bounce 1.4s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-8px);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.human-form{background:#FFF7ED;border:1px solid #FED7AA;border-radius:12px;padding:16px;margin-top:8px;margin-left:46px;}
.human-form p{font-size:0.82rem;color:#92400E;margin-bottom:10px;font-weight:500;}
.human-form textarea{width:100%;padding:10px 12px;border:1px solid #FED7AA;border-radius:8px;font-size:0.85rem;font-family:inherit;resize:none;outline:none;min-height:60px;}
.human-form .form-row{display:flex;gap:8px;margin-top:8px;}
.human-form input{flex:1;padding:8px 12px;border:1px solid #FED7AA;border-radius:8px;font-size:0.85rem;font-family:inherit;outline:none;}
.human-form button{padding:8px 20px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;font-family:inherit;}
.human-form button:hover{background:var(--accent-hover);}
.submit-success{font-size:0.82rem;color:var(--success);font-weight:500;}
.history-panel{position:fixed;top:0;right:-380px;width:380px;height:100%;background:var(--card);box-shadow:-4px 0 24px rgba(0,0,0,0.1);z-index:1000;transition:right 0.3s ease;display:flex;flex-direction:column;}
.history-panel.open{right:0;}
.history-header{padding:16px 20px;background:var(--primary);color:white;display:flex;justify-content:space-between;align-items:center;}
.history-header h3{font-size:1rem;font-weight:600;}
.history-close{background:none;border:none;color:white;font-size:1.3rem;cursor:pointer;padding:4px 8px;}
.history-close:hover{color:var(--accent);}
.history-list{flex:1;overflow-y:auto;padding:12px;}
.history-item{padding:12px 14px;border-radius:10px;margin-bottom:8px;background:#F9FAFB;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;}
.history-item:hover{border-color:var(--accent);background:#FFF7ED;}
.history-item .hi-q{font-size:0.88rem;font-weight:600;margin-bottom:4px;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.history-item .hi-time{font-size:0.72rem;color:var(--text-light);}
.history-item .hi-status{font-size:0.7rem;padding:2px 8px;border-radius:8px;display:inline-block;margin-top:4px;}
.hi-status.answered{background:#ECFDF5;color:#065F46;}
.hi-status.escalated{background:#FEF3C7;color:#92400E;}
.history-empty{text-align:center;padding:40px 20px;color:var(--text-light);font-size:0.9rem;}
.history-clear{padding:12px 20px;border-top:1px solid var(--border);}
.history-clear button{width:100%;padding:10px;background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;border-radius:8px;font-size:0.85rem;font-weight:500;cursor:pointer;font-family:inherit;}
.history-clear button:hover{background:#FEE2E2;}
.history-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);z-index:999;display:none;}
.history-overlay.open{display:block;}
</style>
</head>

<script>
// ========== KNOWLEDGE BASE ==========
const knowledgeBase = [
  {
    keywords: ['什么是dsp','dsp是什么','amazon dsp','dsp介绍','dsp概念','需求方平台','what is dsp','about dsp'],
    synonyms: ['程序化广告','展示广告平台','dsp有什么用','dsp能做什么','dsp产品','上漏斗','品牌广告平台','programmatic','demand side'],
    answer_zh: `Amazon DSP（Demand-Side Platform，需求方平台）是亚马逊的程序化广告平台，凭借大规模精准投放实现高效转化，为品牌与消费者创造有价值的互动。

🔶 核心优势：
• 优质广告库存：覆盖 Prime Video、Twitch、体育赛事直播、Fire TV、Kindle 等亚马逊自有平台，以及数千个第三方优质网站和应用
• 独立受众信号：基于亚马逊独有的第一方浏览、购物及流媒体数据进行精准受众定向，无需依赖第三方 Cookie
• AI 驱动优化：利用 AI 技术自动优化投放，提升投资回报率
• 互操作技术：与 Amazon Marketing Cloud (AMC) 深度整合，提供全链路分析能力

🔶 支持的广告类型：展示广告、在线视频广告、流媒体电视广告、音频广告

🔶 适用场景：品牌建设、新品推广、受众拓展、竞品拦截、再营销、全漏斗策略等。

⚠️ 注意：目前中国跨境卖家需要通过亚马逊授权的 DSP 服务商（代理商）来投放 DSP 广告，不支持卖家自助开通。`,
    answer_en: `Amazon DSP (Demand-Side Platform) is Amazon's programmatic advertising platform that enables precise, large-scale ad delivery for efficient conversions.

🔶 Key Advantages:
• Premium inventory: Covers Prime Video, Twitch, live sports, Fire TV, Kindle, and thousands of third-party sites/apps
• First-party signals: Audience targeting based on Amazon's unique shopping, browsing, and streaming data — no third-party cookies needed
• AI-powered optimization: Automated bid and placement optimization
• Interoperability: Deep integration with Amazon Marketing Cloud (AMC) for full-funnel analytics

🔶 Ad Types: Display, Online Video, Streaming TV, Audio

🔶 Use Cases: Brand building, new product launches, audience expansion, competitor conquesting, retargeting, full-funnel strategies.

⚠️ Note: Chinese cross-border sellers currently need to work with an authorized DSP agency to run DSP campaigns — self-service is not available.`
  },
  {
    keywords: ['dsp区别','sp区别','sponsored ads区别','dsp和sa','dsp和sp','区别','搜索广告','difference','dsp vs','compare'],
    synonyms: ['有什么不同','不一样','差异','对比','比较','哪个好','选哪个','sa和dsp','sp和dsp','versus'],
    answer_zh: `DSP 与 Sponsored Ads（搜索广告）的核心区别：

📌 商品推广 / Sponsored Ads（SA）：
• 搜索驱动，基于关键词和商品定向
• 按单次点击付费（CPC）
• 展示在亚马逊站内搜索结果和商品详情页，以及站外精选应用和网站
• 适合捕获已有购买意图的消费者（下漏斗）

📌 Amazon DSP：
• 受众驱动，基于人群画像和行为数据定向
• 按千次展示付费（CPM）
• 覆盖亚马逊站内 + Prime Video、Twitch 等自有平台 + 数千个第三方网站和应用
• 适合品牌曝光、受众拓展和全漏斗策略（上+中漏斗）

💡 简单来说：SA 是"等客户来找你"，DSP 是"主动去找目标客户"。两者配合使用效果最佳。`,
    answer_en: `Key differences between DSP and Sponsored Ads:

📌 Sponsored Ads (SA):
• Search-driven, keyword and product targeting
• Cost-per-click (CPC) pricing
• Appears in Amazon search results, product pages, and select off-Amazon sites
• Best for capturing existing purchase intent (lower funnel)

📌 Amazon DSP:
• Audience-driven, behavioral and demographic targeting
• Cost-per-thousand impressions (CPM) pricing
• Covers Amazon properties + Prime Video, Twitch + thousands of third-party sites/apps
• Best for brand awareness, audience expansion, full-funnel strategy (upper + mid funnel)

💡 In short: SA = "wait for customers to find you." DSP = "proactively find your target customers." Best results come from using both together.`
  },
  {
    keywords: ['新店铺','新店','新卖家','刚开店','适合投dsp','新品牌','冷启动','新品','new store','new seller','new brand'],
    synonyms: ['刚注册','刚开始','新手','小白','没经验','第一次','入门','起步','出海','新开','just started','beginner'],
    answer_zh: `新店铺是否适合投 DSP？答案是：非常适合，而且越早布局越好。

原因：
1️⃣ 品牌认知建设：新店铺最缺的就是品牌曝光，DSP 可以快速触达目标受众
2️⃣ 受众资产积累：从第一天就开始积累受众数据，后续再营销效果越好
3️⃣ 打破冷启动：单纯依赖 SA，新店铺很难与成熟卖家竞争关键词。DSP 主动触达消费者
4️⃣ 全漏斗协同：DSP（上漏斗引流）+ SA（下漏斗转化）配合，形成完整广告闭环

建议：从较小预算开始测试 DSP，重点关注品牌认知和受众积累指标（如 DPV、NTB 新客占比）。`,
    answer_en: `Is DSP suitable for new stores? Absolutely — the earlier you start, the better.

Why:
1️⃣ Brand awareness: New stores need exposure most. DSP rapidly reaches target audiences
2️⃣ Audience asset building: Start accumulating audience data from day one for better retargeting later
3️⃣ Break the cold start: Relying only on SA, new stores struggle to compete on keywords. DSP proactively reaches consumers
4️⃣ Full-funnel synergy: DSP (upper funnel) + SA (lower funnel) creates a complete advertising loop

Recommendation: Start with a smaller budget to test DSP, focusing on brand awareness and audience metrics (DPV, NTB new-to-brand %).`
  },

<script>
// ========== STATE ==========
let chatHistory = [];
let msgCounter = 0;

// ========== MATCHING ENGINE ==========
function normalize(text) {
  return text.toLowerCase()
    .replace(/[？?！!。，,、；;：:（）()\[\]【】{}"'"'\s]+/g, '')
    .replace(/amazon/gi, '亚马逊').replace(/dsp/gi, 'dsp')
    .replace(/sponsored\s*products?/gi, '商品推广').replace(/sponsored\s*brands?/gi, '品牌推广')
    .replace(/sponsored\s*display/gi, '展示型推广').replace(/sponsored\s*tv/gi, 'stv');
}

function extractWords(text) {
  const words = [];
  for (let len = 4; len >= 2; len--) {
    for (let i = 0; i <= text.length - len; i++) words.push(text.substring(i, i + len));
  }
  const eng = text.match(/[a-z]{2,}/g);
  if (eng) words.push(...eng);
  return [...new Set(words)];
}

function findAnswer(question) {
  const q = normalize(question);
  let bestMatch = null, bestScore = 0;

  for (const item of knowledgeBase) {
    let score = 0;
    // Only count direct keyword matches (strict mode)
    for (const kw of item.keywords) {
      const nkw = normalize(kw);
      if (nkw.length >= 3 && q.includes(nkw)) score += nkw.length * 3;
    }
    if (score > bestScore) { bestScore = score; bestMatch = item; }
  }

  // Only use local if strong keyword match (at least one full keyword hit of 3+ chars)
  if (bestMatch && bestScore >= 12) {
    const answer = currentLang === 'zh' ? bestMatch.answer_zh : bestMatch.answer_en;
    return { found: true, answer };
  }
  // Everything else goes to DeepSeek
  return { found: false, answer: T('noAnswer') };
}

// ========== CHAT FUNCTIONS ==========
function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('quickTags').style.display = 'none';
  addMessage('user', text);
  input.value = ''; autoResize(input);
  showTyping();

  // All questions go to DeepSeek AI
  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question: text, lang: currentLang })
  })
  .then(r => r.json())
  .then(data => {
    hideTyping();
    if (data.answer) {
      const aiMsgId = addMessage('ai', data.answer);
      addFeedback(aiMsgId, text, data.answer, true);
      saveToHistory(text, data.answer, true);
    } else {
      const fallback = T('noAnswer');
      const aiMsgId = addMessage('ai', fallback);
      addFeedback(aiMsgId, text, fallback, false);
      saveToHistory(text, fallback, false);
    }
  })
  .catch(err => {
    hideTyping();
    console.error('API error:', err);
    const fallback = T('noAnswer');
    const aiMsgId = addMessage('ai', fallback);
    addFeedback(aiMsgId, text, fallback, false);
    saveToHistory(text, fallback, false);
  });
}

function addMessage(role, text) {
  const chatArea = document.getElementById('chatArea');
  const id = 'msg-' + (++msgCounter);
  const avatar = role === 'user' ? '&#128100;' : '&#129302;';
  const div = document.createElement('div');
  div.className = 'msg msg-' + role; div.id = id;
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-bubble">${escapeHtml(text)}</div>`;
  chatArea.appendChild(div); chatArea.scrollTop = chatArea.scrollHeight;
  chatHistory.push({ id, role, text, time: new Date().toISOString() });
  return id;
}

function addFeedback(msgId, question, answer, wasFound) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div'); div.className = 'feedback'; div.id = 'fb-' + msgId;
  div.innerHTML = `<button class="feedback-btn" onclick="handleFeedback('${msgId}','good','${encodeURIComponent(question)}')">${T('helpful')}</button><button class="feedback-btn" onclick="handleFeedback('${msgId}','bad','${encodeURIComponent(question)}')">${T('needHuman')}</button>`;
  chatArea.appendChild(div); chatArea.scrollTop = chatArea.scrollHeight;
  if (!wasFound) saveTicket(question, answer, 'auto-escalated');
}

function handleFeedback(msgId, type, encodedQ) {
  const fbDiv = document.getElementById('fb-' + msgId);
  const question = decodeURIComponent(encodedQ);
  if (type === 'good') { fbDiv.innerHTML = `<div class="feedback-done">${T('thanksFeedback')}</div>`; }
  else { fbDiv.innerHTML = ''; showHumanForm(fbDiv, question, msgId); saveTicket(question, '', 'seller-requested'); }
}

function showHumanForm(container, question, msgId) {
  const div = document.createElement('div'); div.className = 'human-form';
  div.innerHTML = `<p>${T('humanFormTitle')}</p><textarea id="detail-${msgId}" placeholder="${T('humanFormDetail')}"></textarea><div class="form-row"><input id="contact-${msgId}" placeholder="${T('humanFormContact')}" /><button onclick="submitHuman('${msgId}','${encodeURIComponent(question)}')">${T('humanFormSubmit')}</button></div>`;
  container.appendChild(div);
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
}

function submitHuman(msgId, encodedQ) {
  const detail = document.getElementById('detail-' + msgId).value;
  const contact = document.getElementById('contact-' + msgId).value;
  const question = decodeURIComponent(encodedQ);
  if (!contact.trim()) { alert(T('humanFormAlert')); return; }
  updateTicket(question, detail, contact);
  sendWeChatNotification(question, detail, contact);
  document.getElementById('fb-' + msgId).innerHTML = `<div class="submit-success">${T('humanFormSuccess')}</div>`;
}

// ========== TICKET SYSTEM ==========
function getTickets() { return JSON.parse(localStorage.getItem('odt_tickets') || '[]'); }
function saveTicket(question, aiAnswer, source) {
  const tickets = getTickets();
  tickets.push({ id:'T-'+Date.now(), question, aiAnswer, detail:'', contact:'', source, status:'pending', adminReply:'', createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() });
  localStorage.setItem('odt_tickets', JSON.stringify(tickets));
}
function updateTicket(question, detail, contact) {
  const tickets = getTickets();
  for (let i = tickets.length-1; i >= 0; i--) {
    if (tickets[i].question === question && tickets[i].status === 'pending') {
      tickets[i].detail = detail; tickets[i].contact = contact; tickets[i].status = 'waiting'; tickets[i].updatedAt = new Date().toISOString(); break;
    }
  }
  localStorage.setItem('odt_tickets', JSON.stringify(tickets));
}

// ========== WECOM WEBHOOK ==========
function sendWeChatNotification(question, detail, contact) {
  const webhookUrl = localStorage.getItem('odt_webhook_url') || 'YOUR_WECOM_WEBHOOK_URL';
  const payload = { msgtype:'markdown', markdown:{ content:`**🔔 新的人工咨询请求**\n> 问题：${question}\n> 补充：${detail||'无'}\n> 联系方式：${contact}\n> 时间：${new Date().toLocaleString('zh-CN')}\n\n请尽快处理` }};
  if (webhookUrl !== 'YOUR_WECOM_WEBHOOK_URL') {
    fetch(webhookUrl, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) }).catch(e => console.log('WeChat notification failed:', e));
  } else { console.log('[WeChat通知模拟]', payload.markdown.content); }
}

// ========== UI HELPERS ==========
function showTyping() {
  const div = document.createElement('div'); div.className = 'msg msg-ai'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar">&#129302;</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  document.getElementById('chatArea').appendChild(div); document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
}
function hideTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }
function askQuick(el) { document.getElementById('userInput').value = el.textContent; sendMessage(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function resetChat() {
  document.getElementById('chatArea').innerHTML = '';
  document.getElementById('welcome').style.display = '';
  document.getElementById('quickTags').style.display = '';
  document.getElementById('userInput').value = '';
  chatHistory = []; msgCounter = 0;
}

// ========== HISTORY ==========
function toggleHistory(e) { e.preventDefault(); const p = document.getElementById('historyPanel'); if (p.classList.contains('open')) closeHistory(); else { renderHistory(); p.classList.add('open'); document.getElementById('historyOverlay').classList.add('open'); } }
function closeHistory() { document.getElementById('historyPanel').classList.remove('open'); document.getElementById('historyOverlay').classList.remove('open'); }
function getHistoryRecords() { return JSON.parse(localStorage.getItem('odt_chat_history') || '[]'); }
function saveToHistory(question, answer, found) {
  const records = getHistoryRecords();
  records.unshift({ question, answer, found, time: new Date().toISOString() });
  if (records.length > 50) records.length = 50;
  localStorage.setItem('odt_chat_history', JSON.stringify(records));
}
function renderHistory() {
  const records = getHistoryRecords(); const list = document.getElementById('historyList');
  if (!records.length) { list.innerHTML = `<div class="history-empty">${T('historyEmpty')}</div>`; return; }
  list.innerHTML = records.map((r, i) => {
    const time = new Date(r.time).toLocaleString(currentLang === 'zh' ? 'zh-CN' : 'en-US');
    const cls = r.found ? 'answered' : 'escalated';
    const txt = r.found ? T('historyAnswered') : T('historyEscalated');
    return `<div class="history-item" onclick="replayQuestion(${i})"><div class="hi-q">${escapeHtml(r.question)}</div><div class="hi-time">${time}</div><span class="hi-status ${cls}">${txt}</span></div>`;
  }).join('');
}
function replayQuestion(i) {
  const r = getHistoryRecords()[i]; if (!r) return; closeHistory();
  document.getElementById('chatArea').innerHTML = '';
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('quickTags').style.display = 'none';
  addMessage('user', r.question); addMessage('ai', r.answer);
}
function clearHistory() { if (confirm(currentLang === 'zh' ? '确定要清空所有历史记录吗？' : 'Clear all history?')) { localStorage.removeItem('odt_chat_history'); renderHistory(); } }

// ========== INIT ==========
setLang(currentLang);
</script>
